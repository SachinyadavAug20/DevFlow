<svg xmlns="http://www.w3.org/2000/svg" width="23" height="23" viewBox="0 0 23 23">
  <!-- 
    baseCase Person Logo (23x23 Favicon)
    Uses the "case" blocks to form a person (representing the student).
    Light blue head (the idea/question) on a dark blue body (the foundation).
  -->
  
  <!-- The Head/Question (Light Blue Case) -->
  <rect x="7" y="1" width="9" height="9" rx="1" fill="#60A5FA" />
  
  <!-- The Body/Foundation (Dark Blue Case) -->
  <rect x="2" y="11" width="19" height="11" rx="2" fill="#2563EB" />
  
</svg>

